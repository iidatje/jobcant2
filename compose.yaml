
x-app-base: &app-base
  image: jobcant2:latest
  build: .
  working_dir: /app
  tty: true
  volumes:
    - .:/app
    - /app/node_modules
  environment:
    - HEADLESS=false
    - JC_MSG
    - JC_DRYRUN
    - JC_CALENDAR_SYNC
    - TZ=Asia/Tokyo
  env_file:
    - .env
  ipc: host
  shm_size: 1g
services:
  jobcant2-wslg:
    <<: *app-base
    container_name: jobcant2-wslg
    profiles: ["wslg"]
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - PULSE_SERVER=${PULSE_SERVER}
  jobcant2:
    <<: *app-base
    container_name: jobcant2
    profiles: ["macos"]
    environment:
      - DISPLAY=host.docker.internal:0
